[target.x86_64-unknown-uefi]
linker = "rust-lld"
rustflags = [
    "-C", "link-arg=--script=/home/mobtgzhang/github2/nt61-rs/nt61/src/boot/linker.ld",
    "-C", "link-arg=--entry=efi_main",
    "-C", "panic=abort",
]

# x86_64 standalone kernel (for multiboot/grub)
[target.x86_64-unknown-none]
linker = "x86_64-linux-gnu-gcc"
rustflags = [
    "-C", "link-arg=-T/home/mobtgzhang/github2/nt61-rs/nt61/src/boot/linker.ld",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=-nostdinc",
    "-C", "panic=abort",
]

# LoongArch64 has no upstream `loongarch64-unknown-uefi` target yet
# (proposed as Tier-3 in rust-lang/compiler-team#953). Until then we
# emit a PE32+-wrapped ELF via a custom linker script + the EDK2
# `GenFw` ELFâ†’PE-COFF translator â€” see `linker-la64.ld` and
# `tools/src/fs/build.rs::build_boot_la64_riscv64`.
[target.loongarch64-unknown-none]
linker = "loongarch64-linux-gnu-ld"
rustflags = [
    "-C", "link-arg=-T/home/mobtgzhang/github2/nt61-rs/nt61/src/boot/linker-la64.ld",
    "-C", "link-arg=--entry=efi_main",
    "-C", "link-arg=-no-gc-sections",
    # `--emit-relocs` instructs the linker to keep relocation information
    # in the output ELF. The build.rs `parse_elf_rela_dyn()` reads this
    # section, translates the ELF `R_LARCH_MARK_LA` entries into
    # `EFI_IMAGE_REL_BASED_LOONGARCH64_MARK_LA` PE relocations, and
    # injects them into the `.reloc` section so EDK2's PE/COFF loader
    # can apply the fixups correctly.
    "-C", "link-arg=-strip-debug",
    # `-nostdlib` keeps the linker from pulling in the C runtime
    # startfiles (`crt0.o`, `crtbegin.o`), which are not installed
    # for our `loongarch64-unknown-none` Rust target on
    # Debian/Ubuntu. Rust's `compiler-builtins` rlib already
    # supplies `memcpy`/`memset`/`__lshrti3`/etc, so the EFI image
    # is self-contained.
    #
    # `-nostdlib` does NOT, however, drop the trailing `-lgcc`
    # that rustc appends to every link command. The Debian/Ubuntu
    # `gcc-13-cross` package set does not ship a
    # `libgcc-X-dev-loongarch64-cross`, so the linker would fail
    # with `cannot find -lgcc`. We satisfy the lookup by pointing
    # `-L` at `tools/loongarch64/lib/`, which contains an empty
    # archive generated by `tools/src/fs/build.rs` (idempotent â€”
    # `ar -rcs` on an empty set produces an 8-byte file with only
    # the ARM magic). Since `compiler-builtins` already covers the
    # CPU helpers, the libgcc stub is never actually pulled in;
    # only the search succeeds.
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-L/home/mobtgzhang/github2/nt61-rs/nt61/tools/loongarch64/lib",
    "-C", "panic=abort",
]  

# RISC-V64 â€” `libgcc-13-dev-riscv64-cross` is installed on
# Debian/Ubuntu so the normal `-lgcc` lookup succeeds; we only
# need to give the linker an extra search path.  

[target.riscv64gc-unknown-none-elf]
linker = "riscv64-linux-gnu-ld"
rustflags = [
    "-C", "link-arg=-T/home/mobtgzhang/github2/nt61-rs/nt61/src/boot/linker-rv64.ld",
    "-C", "link-arg=--entry=efi_main",
    "-C", "link-arg=-no-gc-sections",
    "-C", "link-arg=-L/usr/lib/gcc-cross/riscv64-linux-gnu/13",
    "-C", "link-arg=-L/usr/riscv64-linux-gnu/lib",
    "-C", "panic=abort",
]  
